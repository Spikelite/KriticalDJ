<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KriticalDJ Screen</title>
<style>
:root{--bg:#0b0d10;--text:#e8eaed;--dim:#9aa0a6;--accent:#4fc3f7;--ok:#7bd88f}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,Arial,sans-serif;overflow:hidden;cursor:none}
.view{display:none;position:absolute;inset:0}
body[data-view="play"] #play{display:block}
body[data-view="board"] #board{display:flex}
body[data-view="count"] #count{display:flex}

/* ---- playback view ---- */
#play{background:#000}
#cdg{position:absolute;inset:0;margin:auto;height:100%;aspect-ratio:25/18;max-width:100%;
 image-rendering:pixelated;image-rendering:crisp-edges}
#playhdr{position:absolute;top:0;left:0;right:0;padding:10px 20px;font-size:22px;color:#fff;
 background:linear-gradient(rgba(0,0,0,.65),transparent);display:flex;gap:12px;opacity:.9}
#playhdr b{color:var(--accent)}
#playhdr .nxt{margin-left:auto;color:var(--dim);font-size:18px;align-self:center}
#ptimer{color:var(--dim);font-size:18px;align-self:center;margin-left:14px;
 font-variant-numeric:tabular-nums}
/* up-next call-out: fades in over the song's last seconds so the next
   singer starts moving before the track even ends */
#upnext{position:absolute;left:0;right:0;bottom:0;padding:2.2vh 3vw;font-size:4.2vh;
 background:linear-gradient(transparent,rgba(0,0,0,.8));text-align:center;
 opacity:0;transition:opacity .6s;pointer-events:none}
#upnext.show{opacity:1}
#upnext b{color:var(--ok)}

/* ---- intermission / idle board ----
   Top 2/5: grab-the-mic banner. Bottom 3/5: rotation left, QR packed right. */
#board{flex-direction:column;padding:3vh 4vw;gap:2vh}
#board .top{flex:0 0 40%;display:flex;flex-direction:column;justify-content:center;min-height:0}
#board .bottom{flex:1;display:flex;flex-direction:row;gap:3vw;min-height:0}
#board .rot-col{flex:1;min-width:0;display:flex;flex-direction:column}
#board .qr-col{flex:0 0 auto;max-width:32vw;display:flex;flex-direction:column;
 align-items:flex-end;justify-content:center;gap:1.4vh;text-align:right;margin-left:auto}
#party{font-size:3vh;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
.lbl{font-size:2.4vh;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:1.2vh}
#nowname{font-size:10vh;font-weight:800;color:var(--accent);line-height:1.05;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#nowsong{font-size:4.5vh;margin-top:.5vh;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#rot{margin-top:1vh;font-size:3.2vh;color:var(--dim);line-height:1.75;overflow:hidden}
#rot b{color:var(--text);font-weight:600}
#rot .next b{color:var(--ok)}
#rot .next{color:var(--text)}
#timer{font-size:8vh;font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums;min-height:9vh}
#qr{background:#fff;padding:1.4vh;border-radius:1.6vh;line-height:0}
#qr svg{width:24vh;height:24vh;display:block}
#url{font-size:2.5vh;color:var(--accent)}
#hint{font-size:2.2vh;color:var(--dim)}

/* ---- start-now countdown ---- */
#count{align-items:center;justify-content:center;flex-direction:column;gap:2vh;background:var(--bg)}
#bignum{font-size:34vh;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
#countwho{font-size:5vh}
#countwho b{color:var(--accent)}

/* ---- audio unlock gate ---- */
#gate{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
 background:rgba(0,0,0,.85);z-index:9;font-size:4vh;color:var(--accent);cursor:pointer}
</style>
</head>
<body data-view="board">
<div class="view" id="play">
  <canvas id="cdg" width="300" height="216"></canvas>
  <div id="playhdr"></div>
  <div id="upnext"></div>
</div>
<div class="view" id="board">
  <div class="top">
    <div id="party">Karaoke</div>
    <div class="lbl" id="nowlbl">Grab the mic</div>
    <div id="nowname">&nbsp;</div>
    <div id="nowsong">&nbsp;</div>
  </div>
  <div class="bottom">
    <div class="rot-col">
      <div class="lbl">Rotation</div>
      <div id="rot"></div>
    </div>
    <div class="qr-col">
      <div id="timer"></div>
      <div id="qr"></div>
      <div id="url"></div>
      <div id="hint">Scan to pick your song and join the rotation</div>
    </div>
  </div>
</div>
<div class="view" id="count">
  <div id="bignum">3</div>
  <div id="countwho"></div>
</div>
<div id="gate">&#128266; Tap once to enable sound</div>
<script src="/static/cdgraphics.js"></script>
<script src="/static/qrcode.js"></script>
<script>
"use strict";
const $ = id => document.getElementById(id);
let CFG = {lyrics_offset_ms: 0};
let STATE = null;
let clockOff = 0;            // server_time - local time, for countdown accuracy
let lastSeq = -1;            // transport command sequence already applied
let curEntry = null;         // entry currently loaded on stage
let cdg = null, cdgReady = false;
const audio = new Audio();
audio.preload = "auto";
const ctx = $("cdg").getContext("2d");

fetch("/api/config").then(r => r.json()).then(c => {
  CFG = c;
  $("party").textContent = c.party_name;
  const url = c.public_url;
  $("url").textContent = url.replace(/^https?:\/\//, "").replace(/\/$/, "");
  const q = qrcode(0, "M");
  q.addData(url);
  q.make();
  $("qr").innerHTML = q.createSvgTag({cellSize: 4, margin: 0, scalable: true});
});

// ---- audio unlock (browser autoplay policy) --------------------------------
function tryPlay() {
  audio.play().then(() => { $("gate").style.display = "none"; })
    .catch(() => { $("gate").style.display = "flex"; });
}
$("gate").onclick = () => tryPlay();

// ---- song loading + CDG render loop ----------------------------------------
async function loadSong(entry) {
  curEntry = entry;
  cdgReady = false;
  ctx.clearRect(0, 0, 300, 216);
  $("playhdr").textContent = "";
  const b = document.createElement("b");
  b.textContent = entry.singer;
  $("playhdr").appendChild(b);
  $("playhdr").appendChild(document.createTextNode("  " + entry.title + " — " + entry.artist));
  const nxt = document.createElement("span");
  nxt.className = "nxt";
  nxt.id = "hdrnext";
  $("playhdr").appendChild(nxt);
  const tm = document.createElement("span");
  tm.id = "ptimer";
  $("playhdr").appendChild(tm);
  audio.src = "/media/" + entry.song_id + "/mp3";
  try {
    const r = await fetch("/media/" + entry.song_id + "/cdg");
    if (!r.ok) throw new Error("no cdg");
    cdg = new CDGraphics(await r.arrayBuffer());
    cdgReady = true;
  } catch (e) {
    cdg = null;  // audio-only fallback: header stays, canvas dark
  }
  tryPlay();
}

function renderLoop() {
  requestAnimationFrame(renderLoop);
  if (!cdgReady || !cdg) return;
  const off = (STATE && STATE.lyrics_offset_ms != null)
    ? STATE.lyrics_offset_ms : (CFG.lyrics_offset_ms || 0);  // live KJ nudges
  const t = Math.max(0, audio.currentTime - off / 1000);
  try {
    const frame = cdg.render(t);
    if (frame.isChanged) ctx.putImageData(frame.imageData, 0, 0);
  } catch (e) { /* corrupt packet streams shouldn't kill the loop */ }
}
renderLoop();

audio.addEventListener("ended", () => {
  fetch("/api/screen/ended", {method: "POST"});
});

// ---- countdown + play-view ticking ------------------------------------------
const fmtTime = s => Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");

setInterval(() => {
  if (!STATE) return;
  const remain = Math.max(0, STATE.deadline - (Date.now() / 1000 + clockOff));
  if (STATE.phase === "intermission") {
    $("timer").textContent = STATE.upcoming.length ? Math.ceil(remain) : "";
  } else if (STATE.phase === "countdown") {
    $("bignum").textContent = Math.max(1, Math.ceil(remain));
  } else if (STATE.phase === "playing") {
    // corner elapsed/total timer, and the up-next call-out over the last 15 s
    const tm = $("ptimer"), d = audio.duration;
    if (tm) tm.textContent = isFinite(d) && d > 0
      ? fmtTime(audio.currentTime) + " / " + fmtTime(d) : "";
    $("upnext").classList.toggle("show",
      !!(STATE.next && isFinite(d) && d > 0 && d - audio.currentTime <= 15));
    return;
  }
  $("upnext").classList.remove("show");
}, 200);

// ---- state application ------------------------------------------------------
function apply() {
  const st = STATE;
  clockOff = st.server_time - Date.now() / 1000;

  if (st.phase === "playing" && st.now) {
    document.body.dataset.view = "play";
    if (!curEntry || curEntry.id !== st.now.id) loadSong(st.now);
    const nxt = $("hdrnext");
    if (nxt) nxt.textContent = st.next ? ("next: " + st.next.singer) : "";
    // up-next call-out content (ticker fades it in over the last 15 s)
    const un = $("upnext");
    un.textContent = "";
    if (st.next) {
      un.appendChild(document.createTextNode("🎤 Up next: "));
      const b = document.createElement("b");
      b.textContent = st.next.singer;
      un.appendChild(b);
      un.appendChild(document.createTextNode(" — " + st.next.title));
    }
  } else {
    if (!audio.paused) audio.pause();
    if (st.phase !== "countdown") curEntry = null;
    document.body.dataset.view = st.phase === "countdown" ? "count" : "board";
  }

  // transport commands (KJ play/pause) -- only newly issued ones
  if (st.transport.seq !== lastSeq) {
    const isNew = lastSeq !== -1;
    lastSeq = st.transport.seq;
    if (isNew && st.phase === "playing") {
      if (st.transport.cmd === "pause") audio.pause();
      else if (st.transport.cmd === "restart") { audio.currentTime = 0; tryPlay(); }
      else tryPlay();
    }
  }

  // intermission / idle board
  const up = st.upcoming || [];
  const rot = $("rot");
  rot.textContent = "";
  if (up.length) {
    $("nowlbl").textContent = "Grab the mic";
    $("nowname").textContent = up[0].singer;
    $("nowsong").textContent = up[0].title + " — " + up[0].artist;
    // rotation list: everyone after the current mic-holder, singer — song;
    // the first row (up next) is highlighted
    up.slice(1, 10).forEach((e, i) => {
      const d = document.createElement("div");
      if (i === 0) d.className = "next";
      const b = document.createElement("b");
      b.textContent = e.singer;
      d.appendChild(b);
      d.appendChild(document.createTextNode(" — " + e.title));
      rot.appendChild(d);
    });
  } else {
    $("nowlbl").textContent = st.singers.length ? "Queue is empty" : "Welcome";
    $("nowname").textContent = "Pick a song!";
    $("nowsong").textContent = "";
    $("timer").textContent = "";
  }

  // start-now countdown labels
  if (st.phase === "countdown" && up.length) {
    $("countwho").textContent = "";
    const b = document.createElement("b");
    b.textContent = up[0].singer;
    $("countwho").appendChild(b);
    $("countwho").appendChild(document.createTextNode(" — " + up[0].title));
  }
}

const es = new EventSource("/events");
es.onmessage = e => { STATE = JSON.parse(e.data); apply(); };
</script>
</body>
</html>
