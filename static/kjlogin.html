<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KriticalDJ — Locked</title>
<style>
:root{--bg:#14161a;--panel:#1e2128;--text:#e8eaed;--dim:#9aa0a6;--accent:#4fc3f7;--warn:#e57373}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
 background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,Arial,sans-serif}
.box{background:var(--panel);border-radius:14px;padding:28px 26px;width:300px;text-align:center;
 box-shadow:0 6px 24px rgba(0,0,0,.5)}
h1{font-size:18px;margin:0 0 4px}
p{color:var(--dim);font-size:13px;margin:0 0 18px}
#pin{width:100%;font-size:34px;letter-spacing:.4em;text-align:center;padding:12px;border-radius:10px;
 border:1px solid #3a3f47;background:var(--bg);color:var(--text)}
#pin:focus{outline:2px solid var(--accent)}
button{margin-top:14px;width:100%;font-size:16px;padding:12px;border-radius:10px;border:none;
 background:var(--accent);color:#00222f;font-weight:700;cursor:pointer}
#err{color:var(--warn);font-size:13px;min-height:17px;margin-top:10px}
</style>
</head>
<body>
<div class="box">
  <h1>🔒 KJ access</h1>
  <p>Enter the 4-digit code</p>
  <input id="pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4"
         autocomplete="off" placeholder="••••">
  <button id="go">Unlock</button>
  <div id="err"></div>
</div>
<script>
"use strict";
const $ = id => document.getElementById(id);
$("pin").focus();
function submit(){
  const pin = $("pin").value.trim();
  $("err").textContent = "";
  fetch("/api/kj/login", {method:"POST", body:JSON.stringify({pin})})
    .then(r => { if(r.ok){ location.reload(); } else { $("err").textContent="Wrong code"; $("pin").value=""; $("pin").focus(); } })
    .catch(() => { $("err").textContent="Couldn't reach the server"; });
}
$("go").onclick = submit;
$("pin").addEventListener("keydown", e => { if(e.key==="Enter") submit(); });
</script>
</body>
</html>
